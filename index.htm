<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Wear</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>
     <header>
        <div class="logo-title">
        <img src="" alt="Weather Wear">
        </div>
    </header>

    <section Class="logo-slogan">
        <img src="" alt="What shall I wear today">
    </section>

    <section>
      <div class="search-row">
      <input id="searchInput" type="text" placeholder= "📍Enter a city..." maxlength="60">
      <button class="btn btn-geo" id="geoBtn" title="Use my location">⌖</button>
      <button class="btn btn-primary" id="searchBtn">Search</button>
     </div>
   </section>

    <section>
      <div class="output">
        Feels like 
       <button class="btn btn-c" data-unit="metric"="true">°C</button>
       <button class="btn btn-f" data-unit="imperial"="false">°F</button>
        
      </div>

      <div class="output">
        What to wear
      </div>

      <div class="output">
        Don't forget
      </div>
    </section>
    

  


</body>

<script src="./assets/js/script.js"></script>
</html>
