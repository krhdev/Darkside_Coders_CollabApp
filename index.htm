<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darkside Coders — Weather Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body class="atmo-clear" id="appBody">
  <div class="atmosphere" id="atmosphere" aria-hidden="true"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 3C12 3 6 8 6 13a6 6 0 0 0 12 0c0-5-6-10-6-10z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M12 13v4M10 15h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="brand-name">Skyline</span>
      </div>
      <div class="header-actions">
        <button class="unit-toggle" id="unitToggle" aria-label="Toggle temperature unit">
          <span id="unitLabel">°C</span>
        </button>
        <button class="theme-btn" id="themeToggle" aria-label="Toggle dark mode">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path class="icon-sun" d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zM12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path class="icon-moon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main" id="main">
    <!-- Seaarch -->
    <section class="search-section" aria-label="City search">
      <div class="search-wrap">
        <label for="cityInput" class="sr-only">Search for a city</label>
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/>
          <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
          id="cityInput"
          type="text"
          placeholder="Search any city…"
          autocomplete="off"
          spellcheck="false"
          aria-describedby="searchHint"
        />
        <button class="search-btn" id="searchBtn" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p id="searchHint" class="sr-only">Press Enter or click the arrow to search</p>

      <!-- Search history Pills -->
      <div class="history-pills" id="historyPills" aria-label="Recent searches"></div>
    </section>

    <!-- Statuss Message -->
    <div class="status-message" id="statusMessage" role="status" aria-live="polite"></div>

    <!-- Loading Skeleton -->
    <div class="skeleton-wrap hidden" id="skeleton" aria-hidden="true">
      <div class="skeleton-hero"></div>
      <div class="skeleton-row">
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
      </div>
      <div class="skeleton-forecast"></div>
    </div>

    <!-- Weatther Content -->
    <div class="weather-content hidden" id="weatherContent">
      <!-- Hero Card -->
      <section class="hero-card" aria-label="Current weather">
        <div class="hero-left">
          <div class="hero-location">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <h1 id="cityName">—</h1>
          </div>
          <div class="hero-temp-row">
            <span class="hero-temp" id="temperature">—</span>
            <img class="hero-icon" id="weatherIcon" src="" alt="" />
          </div>
          <p class="hero-desc" id="description">—</p>
          <p class="hero-feels" id="feelsLike">—</p>
        </div>
        <div class="hero-right">
          <time class="hero-time" id="localTime" aria-label="Local time">—</time>
          <p class="hero-date" id="localDate">—</p>
        </div>
      </section>

      <!-- Detail Grrid -->
      <section class="detail-grid" aria-label="Weather details">
        <div class="detail-card">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Humidity">
            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          <span class="detail-label">Humidity</span>
          <span class="detail-value" id="humidity">—</span>
        </div>
        <div class="detail-card">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Wind speed">
            <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="detail-label">Wind</span>
          <span class="detail-value" id="wind">—</span>
        </div>
        <div class="detail-card">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Pressure">
            <path d="M12 2a10 10 0 1 0 10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="detail-label">Pressure</span>
          <span class="detail-value" id="pressure">—</span>
        </div>
        <div class="detail-card">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Visibility">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="detail-label">Visibility</span>
          <span class="detail-value" id="visibility">—</span>
        </div>
        <div class="detail-card">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Sunrise">
            <path d="M17 18a5 5 0 0 0-10 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="2" x2="12" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4.22" y1="10.22" x2="5.64" y2="11.64" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1" y1="18" x2="3" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="21" y1="18" x2="23" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="18.36" y1="11.64" x2="19.78" y2="10.22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="23" y1="22" x2="1" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="detail-label">Sunrise</span>
          <span class="detail-value" id="sunrise">—</span>
        </div>
        <div class="detail-card">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Sunset">
            <path d="M17 18a5 5 0 0 0-10 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="9" x2="12" y2="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4.22" y1="10.22" x2="5.64" y2="11.64" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1" y1="18" x2="3" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="21" y1="18" x2="23" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="18.36" y1="11.64" x2="19.78" y2="10.22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="23" y1="22" x2="1" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="m19 5-7 7-7-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="detail-label">Sunset</span>
          <span class="detail-value" id="sunset">—</span>
        </div>
      </section>

      <!-- 5-Day Forecast -->
      <section class="forecast-section" aria-label="5-day forecast">
        <h2 class="section-title">5-Day Forecast</h2>
        <div class="forecast-strip" id="forecastStrip">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- UV + Air Quality Band -->
      <section class="extra-band" aria-label="Additional metrics">
        <div class="band-item">
          <span class="band-label">UV Index</span>
          <div class="uv-bar-wrap">
            <div class="uv-bar" id="uvBar"></div>
          </div>
          <span class="band-value" id="uvIndex">—</span>
        </div>
        <div class="band-item">
          <span class="band-label">Cloud Cover</span>
          <div class="cloud-wrap" id="cloudWrap">
            <div class="cloud-fill" id="cloudFill"></div>
          </div>
          <span class="band-value" id="cloudCover">—</span>
        </div>
        <div class="band-item">
          <span class="band-label">Min / Max Today</span>
          <span class="band-value minmax" id="minMax">—</span>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <p>Data from <a href="https://openweathermap.org" target="_blank" rel="noopener">OpenWeatherMap</a> · Built with vanilla JS for learning APIs, DOM &amp; async JavaScript</p>
  </footer>

  <script src="./assets/script.js"></script>
</body>
</html>
