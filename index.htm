<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Wear</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
     <header>
        <div class="logo-title">
        <img src="" alt="Weather Wear">
        </div>
        <button class="unit-btn active" data-unit="metric"="true">°C</button>
      <button class="unit-btn" data-unit="imperial"="false">°F</button>
    </header>

    <section>
        <p> What shall I wear today?</p>
    </section>

    
    <div class="search-row">
      <input
        id="searchInput"
        type="text"
        placeholder="City name (e.g. London, Tokyo, New York)"
        maxlength="60"
      >
      <button> class="btn btn-geo" id="geoBtn" title="Use my location">⌖</button>
      <button class="btn btn-primary" id="searchBtn">Search</button>
    </div>
    
  


</body>

<script src="./assets/js/script.js"></script>
</html>
